name: Bug report
description: Report a reproducible bug
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant logs. Avoid secrets.
      render: shell
  - type: input
    id: go_version
    attributes:
      label: Go version
      placeholder: go version
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: windows/linux/darwin + version

