version: 2

before:
  hooks:
    - go mod tidy

project_name: godeploy-platform

builds:
  - id: godeployd
    main: ./cmd/godeployd
    binary: godeployd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
  - id: godeploy-tui
    main: ./cmd/godeploy-tui
    binary: godeploy-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
  - id: godeploy-logtail
    main: ./cmd/godeploy-logtail
    binary: godeploy-logtail
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: bundle
    ids:
      - godeployd
      - godeploy-tui
      - godeploy-logtail
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^style:"
